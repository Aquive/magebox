name: Check Upstream Releases

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  workflow_dispatch:

jobs:
  check-releases:
    name: Check for new Magento/MageOS releases
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for new releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Checking for new upstream releases" > report.md
          NEW_FOUND=false

          # --- MageOS ---
          echo "### MageOS" >> report.md
          MAGEOS_TAGS=$(gh api repos/mage-os/mageos-magento2/tags --paginate --jq '.[].name' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V)
          KNOWN_MAGEOS=$(grep -A1 'version:' lib/templates/config/versions.yaml | grep -oP '"\K[0-9]+\.[0-9]+\.[0-9]+(?=")' | sort -V)

          for tag in $MAGEOS_TAGS; do
            if ! echo "$KNOWN_MAGEOS" | grep -qx "$tag"; then
              echo "- **$tag** (new)" >> report.md
              NEW_FOUND=true
            fi
          done

          if ! grep -q "new" report.md 2>/dev/null || ! grep -q "MageOS" <(grep "new" report.md); then
            echo "- All versions up to date" >> report.md
          fi

          # --- Magento ---
          echo "### Magento Open Source" >> report.md
          MAGENTO_TAGS=$(gh api repos/magento/magento2/tags --paginate --jq '.[].name' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+(-p[0-9]+)?$' | sort -V | tail -20)
          KNOWN_MAGENTO=$(grep -A1 'version:' lib/templates/config/versions.yaml | grep -oP '"\K2\.[0-9]+\.[0-9]+(-p[0-9]+)?(?=")' | sort -V)

          for tag in $MAGENTO_TAGS; do
            if ! echo "$KNOWN_MAGENTO" | grep -qx "$tag"; then
              echo "- **$tag** (new)" >> report.md
              NEW_FOUND=true
            fi
          done

          if ! grep -q "Magento" <(grep "new" report.md 2>/dev/null); then
            echo "- All versions up to date" >> report.md
          fi

          echo "NEW_FOUND=$NEW_FOUND" >> $GITHUB_ENV
          cat report.md

      - name: Create issue if new versions found
        if: env.NEW_FOUND == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if an open issue already exists
          EXISTING=$(gh issue list --label "upstream-release" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue comment "$EXISTING" --body-file report.md
          else
            gh issue create \
              --title "New upstream Magento/MageOS releases detected" \
              --body-file report.md \
              --label "upstream-release"
          fi
